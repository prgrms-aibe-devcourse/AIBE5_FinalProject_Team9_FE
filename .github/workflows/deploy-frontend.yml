name: Deploy Frontend

on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://grimgate.shop
          NEXT_PUBLIC_TOSS_CLIENT_KEY: test_ck_DpexMgkW36yOMLL7nbgb8GbR5ozO

      - name: Copy to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: ".next,public,package.json,package-lock.json"
          target: "/home/ubuntu/app/frontend"

      - name: Restart frontend
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/app/frontend
            npm ci
            pm2 delete grimgate-fe || true
            pm2 start npm --name grimgate-fe -- start
            pm2 save
